# E2E 회귀 테스트 — 프로덕션 smoke test
# 수동 실행 + 매일 자동 1회 (09:00 KST = 00:00 UTC)

name: E2E Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci
        env:
          DATABASE_URL_UNPOOLED: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Playwright 브라우저 설치
        run: npx playwright install chromium

      - name: E2E 테스트 실행
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://www.jundevcodes.info' }}

      - name: 테스트 리포트 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

# CI/CD 파이프라인
# build 체크: 린트 + Next.js 빌드 + Jest 테스트
# deploy 체크: build 통과 후 배포 준비 확인 게이트
#   (실제 Vercel 배포는 Vercel GitHub 연동이 처리 → "Vercel" 체크)
#
# 브랜치 보호 규칙 필수 체크 이름:
#   "build"  ← 이 워크플로우의 build 잡
#   "deploy" ← 이 워크플로우의 deploy 잡

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # 빌드 및 테스트 게이트 — 시크릿 불필요
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: 린트 검사
        run: npm run lint

      - name: Next.js 빌드 검사
        run: npm run build

      - name: 테스트 실행
        # DATABASE_URL 미설정 시 통합 테스트는 자동 skip됨
        run: npx jest --runInBand

  # 배포 준비 확인 게이트 — build 통과 후에만 실행
  # 실제 Vercel 배포는 Vercel GitHub 연동이 별도 처리
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 배포 게이트 통과 확인
        run: |
          echo "빌드 게이트 통과 — Vercel GitHub 연동이 자동으로 배포를 처리합니다"
          echo "브랜치: ${{ github.ref }}"
          echo "이벤트: ${{ github.event_name }}"
